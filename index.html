<script>
async function checkScore(){
  let wallet = document.getElementById("wallet").value.trim();
  let resultBox = document.getElementById("result");

  if(wallet.length < 10){
    resultBox.innerHTML = "Invalid wallet";
    return;
  }

  let apiKey = "WZJ1NE7BGH23KNGCP539DQBHNFY2MAJAF2";

  let url = `https://api.etherscan.io/api?module=account&action=txlist&address=${wallet}&startblock=0&endblock=99999999&sort=asc&apikey=${apiKey}`;

  try {
    resultBox.innerHTML = "Loading...";

    let res = await fetch(url);
    let data = await res.json();

    if(!data || data.status !== "1" || !data.result || data.result.length === 0){
      resultBox.innerHTML = "No transaction data";
      return;
    }

    let txCount = data.result.length;

    let firstTxTime = parseInt(data.result[0].timeStamp);
    let walletAgeDays = (Date.now()/1000 - firstTxTime) / (60*60*24);

    let ageBonus = Math.min(50, walletAgeDays / 30);

    let score = Math.min(100, Math.floor((txCount / 5) + ageBonus));

    resultBox.innerHTML = "Score: " + score + "/100";

  } catch (err) {
    resultBox.innerHTML = "Error loading data";
    console.error(err);
  }
}
        </script>
