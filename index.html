<script>
async function checkScore(){
  let wallet = document.getElementById("wallet").value.trim();

  if(wallet.length < 10){
    document.getElementById("result").innerHTML = "Invalid wallet address";
    return;
  }

  let apiKey = "HWUAMJEJHBGPHHBXM6KY28YC5VC8XVSGEB"; 

  let url = `https://api.etherscan.io/api?module=account&action=txlist&address=${wallet}&startblock=0&endblock=99999999&sort=asc&apikey=${apiKey}`;

  try {
    let res = await fetch(url);
    let data = await res.json();

    if(data.status !== "1" || data.result.length === 0){
      document.getElementById("result").innerHTML = "No transaction data found";
      return;
    }

    let txCount = data.result.length;

    let firstTxTime = data.result[0].timeStamp;
    let walletAgeDays = (Date.now()/1000 - firstTxTime) / (60*60*24);

    let ageBonus = Math.min(50, walletAgeDays / 30);

    let score = Math.min(100, Math.floor((txCount / 5) + ageBonus));

    document.getElementById("result").innerHTML =
      "Score: " + score + "/100";

  } catch (e) {
    document.getElementById("result").innerHTML = "Error fetching data";
  }
}
</script>
